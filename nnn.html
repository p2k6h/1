  <script>
    async function init() {
      const video = document.getElementById('video');
      const ui = video['ui'];
      const controls = ui.getControls();
      const player = controls.getPlayer();

      player.configure({
        drm: {
          clearKeys: {
            'ce43641a061a44fb9d95d986cfc9a68f': '3d63855ca5cdfcfb765f306b98bcc646'
          }
        }
      });

      player.setTextTrackVisibility(true); // Auto ON caption

      window.player = player;
      window.ui = ui;

      player.addEventListener('error', onPlayerErrorEvent);
      controls.addEventListener('error', onUIErrorEvent);

      try {
        await player.load('https://unifi-live2.secureswiftcontent.com/Content/DASH/Live/channel(TV3)/master.mpd');
        console.log('✅ Stream loaded!');
      } catch (error) {
        onPlayerError(error);
      }
    }

    function onPlayerErrorEvent(errorEvent) { onPlayerError(event.detail); }
    function onPlayerError(error) { console.error('Error code', error.code, 'object', error); }
    function onUIErrorEvent(errorEvent) { onPlayerError(event.detail); }
    function initFailed(errorEvent) { console.error('❌ UI load failed!'); }

    document.addEventListener('shaka-ui-loaded', init);
    document.addEventListener('shaka-ui-load-failed', initFailed);

    // Auto adjust bila user rotate device
    window.addEventListener('resize', () => {
      const container = document.getElementById('player-container');
      container.style.width = `${window.innerWidth}px`;
      container.style.height = `${window.innerHeight}px`;
    });
  </script>
